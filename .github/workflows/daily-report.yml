name: Daily Product Report

on:
  schedule:
    # Primary: 7:00 UTC = 8:00 CET (9:00 CEST in summer)
    - cron: '0 7 * * *'
    # Fallback: 7:30 UTC in case GitHub skips the first window
    - cron: '30 7 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  issues: write
  contents: write

jobs:
  daily-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for duplicate report
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +"%Y-%m-%d")
          EXISTING=$(gh issue list --repo Whatsonyourmind/oraclaw --label "daily-report" --search "Daily Report -- ${DATE}" --state all --json title --jq '.[].title' 2>/dev/null || echo "")
          if echo "$EXISTING" | grep -q "Daily Report -- ${DATE}"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Report for ${DATE} already exists, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Daily Report
        if: steps.dedup.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e  # Don't exit on individual failures

          DATE=$(date -u +"%Y-%m-%d")
          REPORT="/tmp/report-body.md"

          # ── OraClaw API Health ──
          ORACLAW_HEALTH=$(curl -s --max-time 15 "https://oraclaw-api.onrender.com/health" 2>/dev/null || echo "UNREACHABLE")
          if echo "$ORACLAW_HEALTH" | grep -q '"ok"'; then
            MODE=$(echo "$ORACLAW_HEALTH" | grep -o '"mode":"[^"]*"' | cut -d'"' -f4)
            API_STATUS="healthy (mode: ${MODE:-unknown})"
          elif echo "$ORACLAW_HEALTH" | grep -q "UNREACHABLE"; then
            API_STATUS="UNREACHABLE (Render may be sleeping)"
          else
            API_STATUS="unexpected response"
          fi

          # ── npm Downloads (all 15 packages) ──
          PACKAGES=(
            "bandit" "solver" "decide" "graph" "calibrate" "simulate"
            "evolve" "bayesian" "ensemble" "risk" "pathfind" "forecast"
            "anomaly" "cmaes" "mcp-server"
          )

          TOTAL_DL=0
          NPM_DETAILS=""
          for pkg in "${PACKAGES[@]}"; do
            DL=$(curl -s --max-time 5 "https://api.npmjs.org/downloads/point/last-week/@oraclaw/${pkg}" 2>/dev/null | grep -o '"downloads":[0-9]*' | cut -d: -f2)
            DL=${DL:-0}
            TOTAL_DL=$((TOTAL_DL + DL))
            if [ "$DL" -gt 0 ]; then
              NPM_DETAILS="${NPM_DETAILS}| @oraclaw/${pkg} | ${DL} |\n"
            fi
          done

          # ── GitHub Stats (OraClaw public) ──
          OC_STARS=$(gh api repos/Whatsonyourmind/oraclaw --jq '.stargazers_count' 2>/dev/null || echo "?")
          OC_FORKS=$(gh api repos/Whatsonyourmind/oraclaw --jq '.forks_count' 2>/dev/null || echo "?")
          OC_ISSUES=$(gh api repos/Whatsonyourmind/oraclaw --jq '.open_issues_count' 2>/dev/null || echo "?")
          OC_WATCHERS=$(gh api repos/Whatsonyourmind/oraclaw --jq '.subscribers_count' 2>/dev/null || echo "?")

          # Traffic (requires contents:write for push access)
          OC_VIEWS_RAW=$(gh api repos/Whatsonyourmind/oraclaw/traffic/views 2>/dev/null || echo "")
          if echo "$OC_VIEWS_RAW" | grep -q '"uniques"'; then
            OC_VIEWS=$(echo "$OC_VIEWS_RAW" | grep -o '"uniques":[0-9]*' | head -1 | cut -d: -f2)
          else
            OC_VIEWS="N/A"
          fi
          OC_CLONES_RAW=$(gh api repos/Whatsonyourmind/oraclaw/traffic/clones 2>/dev/null || echo "")
          if echo "$OC_CLONES_RAW" | grep -q '"uniques"'; then
            OC_CLONES=$(echo "$OC_CLONES_RAW" | grep -o '"uniques":[0-9]*' | head -1 | cut -d: -f2)
          else
            OC_CLONES="N/A"
          fi

          # ── DeckForge ──
          DF_HEALTH=$(curl -s --max-time 15 "https://deckforge-api.onrender.com/v1/health" 2>/dev/null || echo "UNREACHABLE")
          if echo "$DF_HEALTH" | grep -qi '"ok"\|"healthy"\|"status"'; then
            DF_API="healthy"
          elif echo "$DF_HEALTH" | grep -q "UNREACHABLE"; then
            DF_API="UNREACHABLE"
          else
            DF_API="unexpected response"
          fi

          DF_DL=$(curl -s --max-time 5 "https://api.npmjs.org/downloads/point/last-week/@lukastan/deckforge" 2>/dev/null | grep -o '"downloads":[0-9]*' | cut -d: -f2)
          DF_DL=${DF_DL:-0}

          DF_STARS=$(gh api repos/Whatsonyourmind/deckforge --jq '.stargazers_count' 2>/dev/null || echo "?")
          DF_FORKS=$(gh api repos/Whatsonyourmind/deckforge --jq '.forks_count' 2>/dev/null || echo "?")
          DF_VIEWS_RAW=$(gh api repos/Whatsonyourmind/deckforge/traffic/views 2>/dev/null || echo "")
          if echo "$DF_VIEWS_RAW" | grep -q '"uniques"'; then
            DF_VIEWS=$(echo "$DF_VIEWS_RAW" | grep -o '"uniques":[0-9]*' | head -1 | cut -d: -f2)
          else
            DF_VIEWS="N/A"
          fi
          DF_CLONES_RAW=$(gh api repos/Whatsonyourmind/deckforge/traffic/clones 2>/dev/null || echo "")
          if echo "$DF_CLONES_RAW" | grep -q '"uniques"'; then
            DF_CLONES=$(echo "$DF_CLONES_RAW" | grep -o '"uniques":[0-9]*' | head -1 | cut -d: -f2)
          else
            DF_CLONES="N/A"
          fi

          DF_LANDING=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 "https://deckforge.dev" 2>/dev/null)
          DF_LANDING=${DF_LANDING:-000}

          # ── OS Multi Science ──
          OSMS_STARS=$(gh api repos/Whatsonyourmind/OS-Multi-Science --jq '.stargazers_count' 2>/dev/null || echo "?")
          OSMS_FORKS=$(gh api repos/Whatsonyourmind/OS-Multi-Science --jq '.forks_count' 2>/dev/null || echo "?")
          OSMS_VIEWS_RAW=$(gh api repos/Whatsonyourmind/OS-Multi-Science/traffic/views 2>/dev/null || echo "")
          if echo "$OSMS_VIEWS_RAW" | grep -q '"uniques"'; then
            OSMS_VIEWS=$(echo "$OSMS_VIEWS_RAW" | grep -o '"uniques":[0-9]*' | head -1 | cut -d: -f2)
          else
            OSMS_VIEWS="N/A"
          fi

          # ── Build Issue Body ──
          {
            echo "## Daily Product Report -- ${DATE}"
            echo ""
            echo "### OraClaw"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| API Health | ${API_STATUS} |"
            echo "| npm Downloads (week) | ${TOTAL_DL} |"
            echo "| GitHub Stars | ${OC_STARS} |"
            echo "| GitHub Forks | ${OC_FORKS} |"
            echo "| Open Issues | ${OC_ISSUES} |"
            echo "| Watchers | ${OC_WATCHERS} |"
            echo "| Unique Viewers (14d) | ${OC_VIEWS} |"
            echo "| Unique Cloners (14d) | ${OC_CLONES} |"
            echo ""
            echo "<details>"
            echo "<summary>npm Package Breakdown</summary>"
            echo ""
            echo "| Package | Downloads/week |"
            echo "|---------|---------------|"
            echo -e "${NPM_DETAILS}"
            echo ""
            echo "</details>"
            echo ""
            echo "### DeckForge"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| API Health | ${DF_API} |"
            echo "| npm Downloads (week) | ${DF_DL} |"
            echo "| GitHub Stars | ${DF_STARS} |"
            echo "| GitHub Forks | ${DF_FORKS} |"
            echo "| Unique Viewers (14d) | ${DF_VIEWS} |"
            echo "| Unique Cloners (14d) | ${DF_CLONES} |"
            echo "| Landing Page (deckforge.dev) | HTTP ${DF_LANDING} |"
            echo ""
            echo "### OS Multi Science"
            echo ""
            echo "| Metric | Value |"
            echo "|--------|-------|"
            echo "| GitHub Stars | ${OSMS_STARS} |"
            echo "| GitHub Forks | ${OSMS_FORKS} |"
            echo "| Unique Viewers (14d) | ${OSMS_VIEWS} |"
            echo ""
            echo "---"
            echo "*Generated automatically at $(date -u +"%H:%M UTC")*"
          } > "$REPORT"

          # ── Create Issue ──
          gh api repos/Whatsonyourmind/oraclaw/labels -f name="daily-report" -f color="0e8a16" -f description="Automated daily product report" 2>/dev/null || true

          gh issue create \
            --repo Whatsonyourmind/oraclaw \
            --title "Daily Report -- ${DATE}" \
            --body-file "$REPORT" \
            --label "daily-report"

          echo "Daily report issue created successfully"
