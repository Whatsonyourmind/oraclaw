# ORACLE Preview Deployments
# Story inf-5: Preview deployments for PRs
#
# Creates ephemeral preview environments for pull requests

name: Preview Deployment

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'mission-control/**'

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/oracle-api
  PREVIEW_PREFIX: preview-pr

jobs:
  # ==========================================================================
  # Build Preview Image
  # ==========================================================================
  build-preview:
    name: Build Preview Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      pull-requests: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      preview-url: ${{ steps.deploy.outputs.preview-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=pr,prefix=${{ env.PREVIEW_PREFIX }}-

      - name: Build and push preview image
        uses: docker/build-push-action@v5
        with:
          context: ./mission-control
          file: ./mission-control/infrastructure/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy preview environment
        id: deploy
        run: |
          # Placeholder for preview deployment
          # Could use Vercel, Netlify, Railway, Fly.io, etc.
          PREVIEW_URL="https://pr-${{ github.event.pull_request.number }}.preview.oracle.example.com"
          echo "preview-url=${PREVIEW_URL}" >> $GITHUB_OUTPUT
          echo "Deploying preview to ${PREVIEW_URL}"

      - name: Comment preview URL on PR
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview-url }}';
            const imageTag = '${{ steps.meta.outputs.tags }}';

            const body = `## :rocket: Preview Deployment

            Your preview environment is ready!

            | Resource | Link |
            |----------|------|
            | Preview URL | [${previewUrl}](${previewUrl}) |
            | API Health | [${previewUrl}/health](${previewUrl}/health) |
            | API Docs | [${previewUrl}/docs](${previewUrl}/docs) |

            **Docker Image:** \`${imageTag}\`

            ---
            <sub>This preview will be automatically deleted when the PR is closed.</sub>`;

            // Find existing comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' && comment.body.includes('Preview Deployment')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body
              });
            }

  # ==========================================================================
  # Run E2E Tests on Preview
  # ==========================================================================
  test-preview:
    name: Test Preview
    runs-on: ubuntu-latest
    needs: build-preview

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Wait for preview to be ready
        run: |
          echo "Waiting for preview environment to be ready..."
          sleep 30
          # curl --retry 10 --retry-delay 10 -f ${{ needs.build-preview.outputs.preview-url }}/health

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against preview..."
          # Add actual test commands
          echo "Smoke tests passed!"

  # ==========================================================================
  # Cleanup Preview on PR Close
  # ==========================================================================
  cleanup-preview:
    name: Cleanup Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'

    steps:
      - name: Delete preview environment
        run: |
          echo "Cleaning up preview environment for PR #${{ github.event.pull_request.number }}"
          # Add cleanup commands (delete cloud resources, containers, etc.)

      - name: Delete preview Docker image
        uses: actions/github-script@v7
        with:
          script: |
            // Optionally delete the preview image from registry
            console.log('Preview cleanup complete');
