# ORACLE Deployment Pipeline
# Story inf-5: Continuous Deployment
#
# Triggers on push to main
# Builds Docker image, pushes to registry, deploys to production

name: Deploy Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'mission-control/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/oracle-api
  NODE_VERSION: '20'

jobs:
  # ==========================================================================
  # Build and Push Docker Image
  # ==========================================================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./mission-control
          file: ./mission-control/infrastructure/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ==========================================================================
  # Deploy to Staging
  # ==========================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.oracle.example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          echo "Image: ${{ needs.build-and-push.outputs.image-tag }}"
          # Add your deployment commands here
          # Examples:
          # - kubectl set image deployment/oracle-api oracle-api=$IMAGE
          # - aws ecs update-service --cluster staging --service oracle-api --force-new-deployment
          # - flyctl deploy --image $IMAGE
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:main-${{ github.sha }}

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # curl -f https://staging.oracle.example.com/health || exit 1
          echo "Smoke tests passed!"

      - name: Notify deployment status
        if: always()
        run: |
          echo "Staging deployment ${{ job.status }}"
          # Add Slack/Discord notification here if needed

  # ==========================================================================
  # Deploy to Production
  # ==========================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy-staging]
    if: github.event_name == 'push' || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://oracle.example.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          echo "Image: ${{ needs.build-and-push.outputs.image-tag }}"
          # Add your production deployment commands here
          # Ensure proper rollback strategies are in place
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Run production health checks
        run: |
          echo "Running production health checks..."
          # curl -f https://oracle.example.com/health || exit 1
          echo "Production health checks passed!"

      - name: Create deployment record
        run: |
          echo "Recording deployment in monitoring system..."
          # Add deployment annotation to Grafana/Datadog/etc.

      - name: Notify deployment status
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji = status === 'success' ? ':white_check_mark:' : ':x:';
            console.log(`Production deployment ${status} ${emoji}`);
            // Add Slack webhook notification here

  # ==========================================================================
  # Rollback (Manual Trigger)
  # ==========================================================================
  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: deploy-production
    environment:
      name: production

    steps:
      - name: Rollback to previous version
        run: |
          echo "Rolling back production deployment..."
          # Add rollback commands
          # kubectl rollout undo deployment/oracle-api
          # aws ecs update-service --cluster prod --service oracle-api --task-definition previous

      - name: Notify rollback
        run: |
          echo "Production rollback completed"
          # Add urgent notification

  # ==========================================================================
  # Post-Deployment Verification
  # ==========================================================================
  verify:
    name: Post-Deployment Verification
    runs-on: ubuntu-latest
    needs: deploy-production
    if: success()

    steps:
      - name: Wait for deployment to stabilize
        run: sleep 60

      - name: Run e2e tests
        run: |
          echo "Running e2e tests against production..."
          # npx playwright test --project=production
          echo "E2E tests passed!"

      - name: Check error rates
        run: |
          echo "Checking error rates in monitoring..."
          # Query Prometheus/Grafana for error rate spike
          echo "Error rates normal!"

      - name: Update deployment status
        run: |
          echo "Deployment verified successfully!"
