# ORACLE Prometheus Configuration
# Story inf-6: Metrics collection

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'oracle-monitor'

# Alerting configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ORACLE API metrics
  - job_name: 'oracle-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['api:3001']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'oracle-api'

  # Node exporter (if deployed)
  - job_name: 'node'
    static_configs:
      - targets: []

  # Redis metrics (via redis_exporter if deployed)
  - job_name: 'redis'
    static_configs:
      - targets: []

  # PostgreSQL metrics (via postgres_exporter if deployed)
  - job_name: 'postgres'
    static_configs:
      - targets: []
