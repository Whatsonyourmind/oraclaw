# =============================================================================
# ORACLE v2.0 Deploy Pipeline
# Deploy to staging on develop branch, production on main branch
# =============================================================================

name: Deploy

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/oracle-api

jobs:
  # ---------------------------------------------------------------------------
  # Determine Environment
  # ---------------------------------------------------------------------------
  prepare:
    name: Prepare Deployment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.set-env.outputs.environment }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine environment
        id: set-env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./apps/api/package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Build & Push Docker Image
  # ---------------------------------------------------------------------------
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: prepare
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=
            type=raw,value=${{ needs.prepare.outputs.version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ---------------------------------------------------------------------------
  # Deploy to Staging
  # ---------------------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.oracle-api.example.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy to ECS (Staging)
        run: |
          echo "Deploying version ${{ needs.prepare.outputs.version }} to staging..."
          # aws ecs update-service \
          #   --cluster oracle-staging \
          #   --service oracle-api \
          #   --force-new-deployment
          echo "Deployment initiated"

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete..."
          # aws ecs wait services-stable \
          #   --cluster oracle-staging \
          #   --services oracle-api
          sleep 10
          echo "Deployment stable"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests against staging..."
          # curl -f https://staging.oracle-api.example.com/health || exit 1
          echo "Smoke tests passed"

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":rocket: ORACLE API deployed to staging",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*ORACLE API* deployed to *staging*\n\nVersion: `${{ needs.prepare.outputs.version }}`\nCommit: `${{ github.sha }}`"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Deploy to Production
  # ---------------------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [prepare, build]
    if: needs.prepare.outputs.environment == 'production'
    environment:
      name: production
      url: https://api.oracle.example.com
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create deployment record
        run: |
          echo "Creating deployment record..."
          echo "Version: ${{ needs.prepare.outputs.version }}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Commit: ${{ github.sha }}"

      - name: Deploy to ECS (Production)
        run: |
          echo "Deploying version ${{ needs.prepare.outputs.version }} to production..."
          # aws ecs update-service \
          #   --cluster oracle-production \
          #   --service oracle-api \
          #   --force-new-deployment
          echo "Deployment initiated"

      - name: Wait for deployment
        run: |
          echo "Waiting for deployment to complete..."
          # aws ecs wait services-stable \
          #   --cluster oracle-production \
          #   --services oracle-api
          sleep 10
          echo "Deployment stable"

      - name: Run production smoke tests
        run: |
          echo "Running production smoke tests..."
          # curl -f https://api.oracle.example.com/health || exit 1
          echo "Smoke tests passed"

      - name: Update deployment status
        run: |
          echo "Updating deployment status to success..."

      - name: Notify on success
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":white_check_mark: ORACLE API deployed to production",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*ORACLE API* deployed to *production* :rocket:\n\nVersion: `${{ needs.prepare.outputs.version }}`\nCommit: `${{ github.sha }}`\n\n<https://api.oracle.example.com/health|Health Check>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":x: ORACLE API production deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*ORACLE API* production deployment *FAILED* :x:\n\nVersion: `${{ needs.prepare.outputs.version }}`\nCommit: `${{ github.sha }}`\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  # ---------------------------------------------------------------------------
  # Rollback (Manual)
  # ---------------------------------------------------------------------------
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: failure() && needs.prepare.outputs.environment == 'production'
    environment:
      name: production
    steps:
      - name: Rollback notification
        run: |
          echo "Production deployment failed!"
          echo "Manual rollback may be required."
          echo "Previous stable version should be deployed."

      - name: Create rollback issue
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[ROLLBACK REQUIRED] Production deployment failed - ${new Date().toISOString()}`,
              body: `## Production Deployment Failed

              **Version:** ${{ needs.prepare.outputs.version }}
              **Commit:** ${{ github.sha }}
              **Workflow Run:** [Link](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

              ### Required Actions
              1. Investigate the failure in the workflow logs
              2. Rollback to previous stable version if necessary
              3. Fix the issue and redeploy

              ### Rollback Command
              \`\`\`bash
              # Manual rollback to previous version
              aws ecs update-service --cluster oracle-production --service oracle-api --task-definition oracle-api:PREVIOUS_VERSION
              \`\`\`
              `,
              labels: ['deployment', 'critical', 'rollback']
            });
