# =============================================================================
# ORACLE v2.0 Release Pipeline
# Semantic versioning, changelog generation, and release creation
# =============================================================================

name: Release

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      version-type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: 'Create a prerelease'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  packages: write
  issues: write
  pull-requests: write

jobs:
  # ---------------------------------------------------------------------------
  # Analyze Commits
  # ---------------------------------------------------------------------------
  analyze:
    name: Analyze Commits
    runs-on: ubuntu-latest
    outputs:
      should-release: ${{ steps.analyze.outputs.should-release }}
      version-type: ${{ steps.analyze.outputs.version-type }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze commits for release
        id: analyze
        run: |
          # Get commits since last tag
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [[ -z "$LAST_TAG" ]]; then
            echo "No previous tag found, will create initial release"
            echo "should-release=true" >> $GITHUB_OUTPUT
            echo "version-type=minor" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check for conventional commits
          COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"%s" 2>/dev/null || echo "")

          if [[ -z "$COMMITS" ]]; then
            echo "No new commits since last tag"
            echo "should-release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Determine version type from commits
          VERSION_TYPE="patch"

          if echo "$COMMITS" | grep -qE "^(BREAKING CHANGE|feat!|fix!):"; then
            VERSION_TYPE="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            VERSION_TYPE="minor"
          fi

          # Override with manual input if provided
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION_TYPE="${{ github.event.inputs.version-type }}"
          fi

          echo "should-release=true" >> $GITHUB_OUTPUT
          echo "version-type=$VERSION_TYPE" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        if: steps.analyze.outputs.should-release == 'true'
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          if [[ -z "$LAST_TAG" ]]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log ${LAST_TAG}..HEAD --pretty=format:"- %s (%h)")
          fi

          # Group commits by type
          FEATURES=$(echo "$COMMITS" | grep -E "^- feat" || echo "")
          FIXES=$(echo "$COMMITS" | grep -E "^- fix" || echo "")
          DOCS=$(echo "$COMMITS" | grep -E "^- docs" || echo "")
          CHORES=$(echo "$COMMITS" | grep -E "^- chore" || echo "")
          OTHER=$(echo "$COMMITS" | grep -vE "^- (feat|fix|docs|chore)" || echo "")

          CHANGELOG="## Changes\n\n"

          if [[ -n "$FEATURES" ]]; then
            CHANGELOG+="### Features\n$FEATURES\n\n"
          fi

          if [[ -n "$FIXES" ]]; then
            CHANGELOG+="### Bug Fixes\n$FIXES\n\n"
          fi

          if [[ -n "$DOCS" ]]; then
            CHANGELOG+="### Documentation\n$DOCS\n\n"
          fi

          if [[ -n "$CHORES" ]]; then
            CHANGELOG+="### Maintenance\n$CHORES\n\n"
          fi

          if [[ -n "$OTHER" ]]; then
            CHANGELOG+="### Other\n$OTHER\n\n"
          fi

          # Escape for GitHub output
          CHANGELOG="${CHANGELOG//'%'/'%25'}"
          CHANGELOG="${CHANGELOG//$'\n'/'%0A'}"
          CHANGELOG="${CHANGELOG//$'\r'/'%0D'}"

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo -e "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ---------------------------------------------------------------------------
  # Create Release
  # ---------------------------------------------------------------------------
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: analyze
    if: needs.analyze.outputs.should-release == 'true'
    outputs:
      version: ${{ steps.version.outputs.new-version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version
        id: version
        run: |
          # Get current version
          CURRENT_VERSION=$(node -p "require('./apps/api/package.json').version")
          echo "Current version: $CURRENT_VERSION"

          # Calculate new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT_VERSION"

          VERSION_TYPE="${{ needs.analyze.outputs.version-type }}"

          case $VERSION_TYPE in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"

          # Add prerelease suffix if requested
          if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
            NEW_VERSION="${NEW_VERSION}-rc.$(date +%Y%m%d%H%M%S)"
          fi

          echo "New version: $NEW_VERSION"
          echo "new-version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT

          # Update package.json files
          npm version $NEW_VERSION --no-git-tag-version --workspace=@mission-control/api
          npm version $NEW_VERSION --no-git-tag-version --workspace=@mission-control/shared-types

      - name: Update CHANGELOG.md
        run: |
          NEW_VERSION="${{ steps.version.outputs.new-version }}"
          DATE=$(date +%Y-%m-%d)

          CHANGELOG_ENTRY="# Changelog\n\n## [$NEW_VERSION] - $DATE\n\n${{ needs.analyze.outputs.changelog }}\n"

          if [[ -f "CHANGELOG.md" ]]; then
            # Prepend to existing changelog
            echo -e "$CHANGELOG_ENTRY$(cat CHANGELOG.md | tail -n +2)" > CHANGELOG.md
          else
            # Create new changelog
            echo -e "$CHANGELOG_ENTRY" > CHANGELOG.md
          fi

      - name: Commit version bump
        run: |
          git add .
          git commit -m "chore(release): v${{ steps.version.outputs.new-version }}"
          git push

      - name: Create Git tag
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const changelog = `${{ needs.analyze.outputs.changelog }}`;

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: '${{ steps.version.outputs.tag }}',
              name: 'ORACLE v${{ steps.version.outputs.new-version }}',
              body: `# ORACLE v${{ steps.version.outputs.new-version }}

            ${changelog}

            ## Docker Image

            \`\`\`bash
            docker pull ghcr.io/${{ github.repository }}/oracle-api:${{ steps.version.outputs.tag }}
            \`\`\`

            ## Installation

            \`\`\`bash
            npm install @mission-control/api@${{ steps.version.outputs.new-version }}
            \`\`\`
            `,
              draft: false,
              prerelease: ${{ github.event.inputs.prerelease || false }}
            });

            console.log(`Created release: ${release.data.html_url}`);

  # ---------------------------------------------------------------------------
  # Build & Publish Release Artifacts
  # ---------------------------------------------------------------------------
  publish:
    name: Publish Artifacts
    runs-on: ubuntu-latest
    needs: [analyze, release]
    if: needs.analyze.outputs.should-release == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build --workspaces --if-present

      - name: Publish to GitHub Packages
        run: |
          npm publish --workspace=@mission-control/shared-types --access public || true
          npm publish --workspace=@mission-control/api --access public || true
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/oracle-api:${{ needs.release.outputs.tag }}
            ghcr.io/${{ github.repository }}/oracle-api:latest
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.release.outputs.version }}

  # ---------------------------------------------------------------------------
  # Notify
  # ---------------------------------------------------------------------------
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [release, publish]
    if: always() && needs.analyze.outputs.should-release == 'true'
    steps:
      - name: Notify on success
        if: needs.release.result == 'success' && needs.publish.result == 'success'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":tada: ORACLE v${{ needs.release.outputs.version }} released!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*ORACLE v${{ needs.release.outputs.version }}* has been released! :rocket:\n\n<${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ needs.release.outputs.tag }}|View Release Notes>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Notify on failure
        if: needs.release.result == 'failure' || needs.publish.result == 'failure'
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": ":x: ORACLE release failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*ORACLE release failed* :x:\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Workflow>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
