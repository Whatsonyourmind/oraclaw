services:
  - type: web
    name: oraclaw-api
    runtime: node
    region: frankfurt
    plan: free
    rootDir: mission-control
    buildCommand: npm install && npx tsc --project apps/api/tsconfig.json
    startCommand: node apps/api/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: RECEIVING_WALLET_ADDRESS
        value: "0x450996401D587C8206803F544cCA74C33f6FbC93"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: web
    name: oraclaw-web
    runtime: node
    region: frankfurt
    plan: free
    rootDir: web
    buildCommand: npm install && npm run build
    startCommand: node .next/standalone/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://oraclaw-api.onrender.com
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: "0.0.0.0"
